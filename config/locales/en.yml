          heading: "Thief Attack"
          desc: "Thieves (1 per Town Center) can be sent on covert operations. Available missions:"
          steal_army_html: "<strong>Steal Army Info</strong> — learn the exact army composition of the target"
          steal_buildings_html: "<strong>Steal Building Info</strong> — learn the exact building counts of the target"
          steal_research_html: "<strong>Steal Research Info</strong> — learn the research levels of the target"
          steal_goods_html: "<strong>Steal Goods</strong> — steal a portion of the target's resources"
          poison_html: "<strong>Poison Water</strong> — kill a portion of the target's population and army"
          fire_html: "<strong>Set Fire</strong> — demolish some of the target's buildings"
          defense_html: "Only thieves defend against thief attacks. Thief attack / defense: %{atk} / %{def}."
        mechanics:
          heading: "Battle Mechanics"
          random: "Attack outcome has a random ±10%% swing."
          wall: "Wall protection adds a percentage bonus to defender's defense points."
          mil_losses_html: "<em>Military Losses</em> research reduces casualties (up to 50%% reduction at 50 levels)."
          attack_pts_html: "<em>Attack Points</em> research increases your attack power by 1%% per level."
          defense_pts_html: "<em>Defense Points</em> research increases your defense power by 1%% per level."
          starvation: "Soldiers starving during a campaign survive at 95%% rate per turn of starvation."
      explore:
        title: "Exploring"
        intro_html: "Explorers are sent from Town Centers to discover new land for your empire. Each Town Center provides <strong>%{max_explorers} maximum explorers</strong> and %{food_per_explorer} food per explorer per trip."
        trip_length:
          heading: "Explorer Trip Length"
          table:
            horses: "Horses"
            turns: "Trip Length (turns)"
          no_horses: "No horses"
          h1x: "1× horses"
          h2x: "2× horses"
          h3x: "3× horses"
        horses_desc_html: "Longer trips with horses discover <strong>more land per explorer</strong>. The horse multiplier scales exploration output roughly proportionally to trip length. Horses are consumed (1 horse per explorer for each horse tier)."
        land_dist:
          heading: "Land Type Distribution (base per explorer)"
          table:
            type: "Land Type"
            chance: "Base Chance"
            mult: "Focus Multiplier"
          mountains: "Mountains"
          forest: "Forest"
          plains: "Plains"
        focus_desc_html: "When you focus on a specific land type, the focus multiplier applies to that type while the others get a <strong>penalty of ~0.33×</strong>. The actual land found has some randomness — results vary between roughly ⅓ and the full base amount."
        min_party:
          heading: "Minimum Party Size"
          desc_html: "You need at least <strong>4 explorers</strong> per expedition."
        efficiency:
          heading: "Efficiency Penalty"
          desc_html: "Large empires get an efficiency penalty on exploration. Once your total land exceeds <strong>500,000 squares</strong>, efficiency drops: <code>efficiency = (100 − (land / 500k)) / 100</code>, with a minimum of 1%%. The <em>Explorers</em> research offsets this by adding 1%% per level."
        food_req:
          heading: "Minimum Explorers Requirement"
          desc: "You need enough food to send explorers. Food cost = (food per explorer) × (number of explorers) × (trip length in turns)."
        tip_html: "<strong>Tip:</strong> Early in the game, always keep explorers running. Build more Town Centers to unlock more explorer slots. Send 3× horses once you have a stable supply to maximize land discovery per expedition."
      people:
        title: "Population"
        intro: "Population is your workforce. Buildings need workers; without enough people, some buildings will not produce anything when you end a turn."
        cap:
          heading: "Population Cap"
          desc_html: "Your maximum population is determined by <strong>Houses</strong> and <strong>Town Centers</strong>. Each House provides %{house_pop} population cap. Each Town Center provides %{tc_pop} population cap. The minimum population is always 100 (you can never go below this)."
        growth:
          heading: "Population Growth"
          desc: "Population growth is controlled by your Food Ratio setting (set on the Management screen). Higher ratios consume more food but grow your population faster."
          table:
            ratio: "Food Ratio"
            change: "Population Change / Turn"
            multiplier: "Food Multiplier"
          very_low: "Very Low (−2)"
          low: "Low (−1)"
          normal: "Normal (0)"
          high: "High (+1)"
          very_high: "Very High (+2)"
          maximum: "Maximum (+3)"
          extreme: "Extreme (+4)"
          footnote: "Growth is divided by 10,000 so actual net change per turn depends on your total population."
        food:
          heading: "Food Consumption"
          desc: "Population eats food every turn based on the food ratio and game settings. Your civilization may modify how many people one unit of food feeds. If your food supply runs out:"
          starve_html: "<strong>7%% of your population starves</strong> each turn food is negative."
          soldiers: "Soldiers on campaigns survive at a 95%% rate when food runs out."
        winter:
          heading: "Winter Heating"
          desc_html: "During winter months (November–February, turns 11–2), people consume wood for heating. Default: 1 wood heats approximately <strong>100–125 people</strong> (depends on game settings). If there is not enough wood for heating, some people will <strong>freeze</strong>: the number of people without heat divided by 8 will die each winter turn."
        working:
          heading: "Working Population"
          desc_html: "At most <strong>50%%</strong> of your population can work as construction builders. The remaining population fills jobs in production buildings. If you have more jobs than workers, some buildings will be idle — watch the status panel in the Builders tab for a warning."
        civ_mods:
          heading: "Civilization Modifiers"
          desc: "Some civilizations change population mechanics:"
          franks_html: "<strong>Franks</strong> — slower population growth (0.80× modifier)"
          mongols_html: "<strong>Mongols</strong> — faster growth (1.4×), people eat less food"
          chinese_html: "<strong>Chinese</strong> — fastest growth (2.0×)"
          byzantines_html: "<strong>Byzantines</strong> — people eat less food (1 food per 60 people)"
          vikings_html: "<strong>Vikings</strong> — 1 wood heats 125 people (more efficient heating)"
      research:
        title: "Research"
        intro_html: "Research is generated by <strong>Mage Towers</strong>. Each active Mage Tower produces <strong>%{production} research point per turn</strong> and consumes <strong>%{gold} gold per turn</strong>. Set your current research focus on the Research tab in the game."
        cost_formula:
          heading: "Research Cost Formula"
          desc: "The cost to gain the next level increases super-linearly with your total research levels across all types:"
          formula: "cost = 10 + (total_levels² × √total_levels)"
          note: "Early levels are cheap; later levels become extremely expensive. Plan research priorities carefully."
        military:
          heading: "Military Research"
          table:
            research: "Research"
            effect: "Effect per Level"
            max: "Max Levels"
          attack_points: "Attack Points"
          attack_points_effect: "+1%% attack power for all units"
          defense_points: "Defense Points"
          defense_points_effect: "+1%% defense power for all units"
          thieves: "Thieves Strength"
          thieves_effect: "+1%% thief effectiveness"
          catapults: "Catapults Strength"
          catapults_effect: "+1%% catapult effectiveness"
          mil_losses: "Military Losses"
          mil_losses_effect: "−1%% casualties in battle"
          conquered: "Conquered Land"
          conquered_effect: "+1%% land gained per victory"
          upkeep: "Army Upkeep Cost"
          upkeep_effect: "−1%% gold/food upkeep for soldiers"
          training: "Army Training Cost"
          training_effect: "−1%% resource cost to train soldiers"
        production:
          heading: "Production Research"
          food: "Food Production"
          food_effect: "+1%% food produced by farms and hunters"
          wood: "Wood Production"
          wood_effect: "+1%% wood produced by wood cutters"
          mine: "Mine Production"
          mine_effect: "+1%% iron and gold produced by mines"
          weapons: "Weapons & Tools Production"
          weapons_effect: "+1%% output from weaponsmiths and tool makers"
          wine: "Wine Production"
          wine_effect: "+1%% wine produced by wineries"
          horses: "Horses Production"
          horses_effect: "+1%% horses produced by stables"
        empire:
          heading: "Empire Research"
          space: "Space Effectiveness"
          space_effect: "+1%% storage capacity (town centers, warehouses)"
          markets: "Markets Output"
          markets_effect: "+10%% maximum local trades per turn"
          explorers: "Explorers"
          explorers_effect: "+1%% land discovered per explorer"
          fort: "Fort Space"
          fort_effect: "Increases fort capacity"
        tip_html: "<strong>Tip:</strong> Early-game priorities: <em>Food Production</em> and <em>Wood Production</em> support growth. <em>Explorers</em> is excellent when exploring heavily. <em>Army Upkeep Cost</em> and <em>Army Training Cost</em> save significant resources as your army grows. Max these out (50 levels = 50%% reduction) before going higher on uncapped types."
      trade:
        title: "Trade"
        local:
          heading: "Local Trade"
          desc: "Local trade lets you buy and sell goods with your own people at fixed prices. The number of goods you can trade per turn depends on your markets:"
          town_center_html: "Each <strong>Town Center</strong> allows %{count} local trades per turn."
          market_html: "Each <strong>Market</strong> allows an additional %{count} trades per turn."
          research_html: "<em>Markets Output</em> research adds 10%% more trades per level."
          price: "Local prices are set per game. A price multiplier applies based on your score relative to other players — richer empires pay/receive slightly more."
        auto:
          heading: "Auto-Trade"
          desc: "You can configure automatic trades that run every time you end a turn. Available resources for auto-trade: wood, food, iron, tools. Auto-trades count against your maximum local trade limit for that turn. Set auto-buy and auto-sell quantities on the Local Trade tab."
        global:
          heading: "Global Market"
          desc: "The global market lets you trade with other players. Resources available: wood, food, iron, tools, swords, bows, maces, horses, wine."
          selling_label: "Selling on the global market:"
          sell1: "Your market capacity controls how many goods you can list per turn."
          sell2_html: "There is a <strong>5%% seller fee</strong> deducted from proceeds when goods sell."
          sell3: "You set your own price (within the game's min/max bounds per resource)."
          sell4_html: "Caravans take <strong>3 turns</strong> to arrive at the buyer."
          sell5: "You can withdraw unsold listings (10%% withdrawal fee applies)."
          buying_label: "Buying on the global market:"
          buy1: "Browse active seller listings and place buy orders."
          buy2_html: "There is a <strong>5%% buyer fee</strong> added to the listed price."
          buy3_html: "Purchased goods travel for <strong>3 turns</strong> before arriving in your empire."
        tip_html: "<strong>Tip:</strong> Wine cannot be traded on the global market — it can only be produced. Use the global market to offload surplus iron or wood, and to buy missing weapons (swords, bows, maces) rather than building a large weaponsmith workforce."
        aid_html: "See the %{aid_link} for sending resources directly to allied players."
        aid_link_text: "Aid page"
      aid:
        title: "Aid"
        intro: "Aid lets you send resources directly to another player as a gift. This is useful for helping allies grow or survive difficult situations."
        resources:
          heading: "Resources You Can Send"
          list: "wood, food, iron, gold, tools, maces, swords, bows, horses, wine"
        how:
          heading: "How Aid Works"
          fee_html: "Aid is subject to a <strong>5%% merchant fee</strong> — the recipient receives 95%% of what you send."
          capacity: "Aid uses your local trade capacity (counts against your max trades for that turn)."
          turns_html: "Goods take <strong>3 turns</strong> to arrive."
          cooldown_html: "You can only send aid to a specific player once every <strong>4 hours</strong>."
        tip_html: "<strong>Tip:</strong> Coordinate with alliance members to share resources efficiently. Sending iron and tools to a new alliance member helps them build faster. Sending food can help an empire survive a food shortage before their farms come online."
        cancel:
          heading: "Canceling Aid"
          desc: "You can cancel an aid caravan while it is still en route on the Aid tab. The goods will be returned to you."
      manage:
        title: "Management Tips"
        early:
          heading: "Early Game (turns 1–500)"
          steps_html:
            - "Build <strong>5–10 Tool Makers</strong> immediately — set their production to 30–50%% to conserve resources."
            - "Build <strong>Wood Cutters</strong> and <strong>Iron Mines</strong> — you need a steady supply of both."
            - "Build <strong>Town Centers</strong> — each one unlocks 6 explorers, plus thief/catapult/special unit slots."
            - "Build <strong>Farms</strong> and <strong>Hunters</strong> to feed your growing population and exploration parties."
            - "Always keep explorers running — land is everything early on."
            - "Set food ratio to <strong>Very High</strong> or <strong>Maximum</strong> to grow population fast."
            - "Build <strong>Houses</strong> if you're running out of population capacity before you have enough Town Centers."
        mid:
          heading: "Mid Game"
          steps_html:
            - "Build <strong>Mage Towers</strong> once you have reliable gold income and spare plains land. Start research immediately."
            - "Build <strong>Warehouses</strong> if resources are hitting the storage cap — lost resources are wasted turns."
            - "Build <strong>Markets</strong> to increase local trade volume and access the global market."
            - "Build <strong>Stables</strong> and <strong>Weaponsmiths</strong> when ready to train army."
            - "Build <strong>Forts</strong> before training large numbers of regular units."
        army:
          heading: "Army Management"
          items:
            - "Never train army if you can't afford the upkeep — unpaid soldiers desert at 10%% per turn."
            - "Keep fort capacity in mind: soldiers over the cap desert at 25%% per turn."
            - "Catapults and Thieves require Town Center space (1 per center) — plan Town Center count accordingly."
          items_html:
            - "<em>Army Upkeep Cost</em> research (max 50 levels) cuts upkeep by up to 50%% — a huge long-term saving."
            - "<em>Army Training Cost</em> research (max 50 levels) cuts training weapon requirements by up to 50%%."
        resources:
          heading: "Resource Management"
          items:
            - "Watch your storage cap — check the status bar. Overflow is silently lost."
            - "Tools wear out in months 5 and 10 (10–20%% of builder tools). Keep a buffer of tools."
            - "Winter (months 11–2): make sure you have enough wood for heating. 1 wood heats ~100 people."
            - "Farms don't produce in winter (months 11–3) — have Hunters or stored food to cover the gap."
            - "Wine can't be traded — if you want to use wine in attacks, you must produce it yourself."
        production_pct:
          heading: "Building Status (Production %%)"
          desc: "Production buildings (farms, hunters, mines, etc.) can be set to a production percentage from the Builders tab. Reducing production saves resources at the cost of lower output. This is useful for Tool Makers early on (set to 30–50%% so they don't drain all your wood/iron)."
        research:
          heading: "Research Priorities"
          items_html:
            - "<strong>Cap first:</strong> <em>Military Losses</em>, <em>Army Upkeep Cost</em>, <em>Army Training Cost</em> all cap at 50 — max these before over-investing in uncapped types."
            - "<strong>Early production:</strong> Food Production and Wood Production pay dividends throughout the game."
            - "<strong>Explorers:</strong> Excellent if you're still in the land-growth phase."
            - "<strong>Markets Output:</strong> Valuable if you rely on local trade for resource balance."
        protection:
          heading: "Protection Period"
          desc_html: "You have <strong>%{turns} turns of protection</strong> when starting. Use this window entirely for building your economy. Do not train army yet — focus on land, population, and production infrastructure."
