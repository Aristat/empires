        builders:
          heading: "Builders"
          desc_html: "Each Tool Maker provides %{per_maker} builders, plus %{base_count} default builders at the start. Builders require one tool each to work. Building construction time (in builder-turns) equals the sum of the building's wood and iron costs."
      wall:
        title: "Great Wall"
        intro: "The Great Wall provides additional defense against all types of attack. Wall protection is calculated as a percentage based on how many wall units you have relative to your total land."
        how_it_works:
          heading: "How It Works"
          items_html:
            - "You need <strong>5%% of your total land</strong> in wall units for 100%% extra protection."
            - "Protection %% = (current wall / max wall) × 100, capped at 100%%."
            - "Wall protection adds that percentage to your defense points during combat."
            - "The wall slowly decays each turn — there is a 25%% chance per turn of decay occurring."
            - "When decay happens: wall × random(1..100) / 750 units are lost (minimum 10 wall before decay applies)."
        building:
          heading: "Building the Wall"
          desc_html: "On the Wall tab in the game, set the percentage of your builders you want to dedicate to wall construction. Wall builders work separately from building-queue builders. <strong>25 builders</strong> produce 1 wall unit per turn. Wall construction consumes the following resources (per wall unit):"
