      home:
        title: "Welcome to Empires Documentation"
        playing_as_html: "You are playing as <strong>%{civ_name}</strong> in Game #%{game_id}."
        guest_html: "Documentation for Game #%{game_id}."
        nav_hint: "Use the navigation on the left to browse topics."
        getting_started: "Getting Started"
        advanced_topics: "Advanced Topics"
        link_desc:
          basics: "turns, land, how to grow"
          civs: "all civilizations and their bonuses"
          resources: "gold, food, iron, wood and more"
          buildings: "what to build and where"
          people: "managing your people"
          manage: "tips for new players"
          army: "all unit stats and costs"
          attack: "army, catapult and thief attacks"
          research: "all 18 research types"
          trade: "local and global market"
          aid: "sending resources to other players"
          explore: "how to discover new land"
          wall: "building and maintaining the wall"
        note_html: "<strong>Note:</strong> All numbers shown in this documentation reflect the actual settings of Game #%{game_id}. Values may differ from other games if the game was set up with custom parameters."
      basics:
        title: "Game Basics"
        turns:
          heading: "Turns"
          p1_html: "Empires is a turn-based game — each turn represents one month of in-game time. You accumulate turns over time and spend them to advance the game. The maximum number of stored turns is <strong>%{max_turns}</strong>. New turns arrive every <strong>%{minutes}</strong> minutes."
          p2: "When you end a turn, all production runs, armies move, buildings advance in the queue, explorers return, and resources are consumed. The calendar starts at year 1000 A.D."
        land:
          heading: "Land"
          desc: "There are three types of land, each used for different buildings:"
          table_type: "Type"
          table_used_for: "Used For"
          mountains: "Mountains"
          forest: "Forest"
          plains: "Plains"
          mountains_used: "Iron Mines, Gold Mines"
          forest_used: "Wood Cutters, Hunters"
          plains_used: "Farms, Houses, Forts, Town Centers, Warehouses, Markets, Mage Towers, Weaponsmiths, Tool Makers, Wineries, Stables, Towers"
          gain_html: "You gain land by <strong>exploring</strong> (send explorers from town centers) or by <strong>conquering</strong> it from other empires. At the start of the game, exploring is almost always more efficient than attacking — army upkeep is expensive and you need a large force to take significant land."
        getting_started:
          heading: "Getting Started"
          steps_html:
            - "Build <strong>Tool Makers</strong> first (5–10 is a good start) — each provides builders for construction."
            - "Build <strong>Wood Cutters</strong> and <strong>Iron Mines</strong> so you can construct more buildings."
            - "Build <strong>Town Centers</strong> to unlock explorers, thieves, catapults, and special units."
            - "Build <strong>Farms</strong> and <strong>Hunters</strong> to feed your growing population and explorers."
            - "Send <strong>explorers</strong> constantly — land is your most important resource early on."
            - "Set food ratios to <strong>High</strong> or <strong>Very High</strong> so your population grows fast."
            - "Join an <strong>alliance</strong> for protection while you build up your empire."
            - "Once you have steady income and spare land, build <strong>Mage Towers</strong> for research."
            - "Build <strong>Weapons</strong> and train <strong>Army</strong> only after you have a solid economy."
        seasons:
          heading: "Seasons"
          desc: "The in-game calendar affects production:"
          farms_html: "<strong>Farms</strong> only produce food during months April–October (months 4–10)."
          winter_html: "<strong>Winter</strong> (November–February, months 11–2): people consume wood for heating. If you run out of wood, people freeze and die."
        protection:
          heading: "Protection"
          desc_html: "New players start with <strong>%{turns} turns of protection</strong>, during which they cannot be attacked. Use this time to build up your economy."
        scoring:
          heading: "Scoring"
          desc: "Your score reflects the total strength of your empire — resources, buildings, army, and research all contribute. Score also affects attack mechanics: attacking a much weaker player gives fewer victory points and suffers run penalties."
      civs:
