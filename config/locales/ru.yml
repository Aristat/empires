      basics:
        title: "Основы игры"
        turns:
          heading: "Ходы"
          p1_html: "Empires — пошаговая игра, каждый ход представляет один месяц игрового времени. Ходы накапливаются со временем и тратятся на развитие. Максимум накопленных ходов: <strong>%{max_turns}</strong>. Новый ход поступает каждые <strong>%{minutes}</strong> минут."
          p2: "При окончании хода запускается производство, армии двигаются, очередь строительства продвигается, разведчики возвращаются, ресурсы потребляются. Календарь начинается с 1000 г. н.э."
        land:
          heading: "Земля"
          desc: "Существует три типа земли, каждый для разных построек:"
          table_type: "Тип"
          table_used_for: "Используется для"
          mountains: "Горы"
          forest: "Лес"
          plains: "Равнина"
          mountains_used: "Железные рудники, Золотые рудники"
          forest_used: "Лесорубы, Охотники"
          plains_used: "Фермы, Дома, Форты, Городские центры, Склады, Рынки, Башни магов, Оружейники, Мастерские инструментов, Винодельни, Конюшни, Башни"
          gain_html: "Землю можно получить через <strong>разведку</strong> (отправка разведчиков из городских центров) или через <strong>завоевание</strong> у других империй. В начале разведка почти всегда эффективнее атаки — содержание армии дорого, а для захвата нужна большая сила."
        getting_started:
          heading: "Начало игры"
          steps_html:
            - "Сначала стройте <strong>Мастерские инструментов</strong> (5–10 — хороший старт) — каждая даёт строителей."
            - "Стройте <strong>Лесорубов</strong> и <strong>Железные рудники</strong> для стабильного снабжения."
            - "Стройте <strong>Городские центры</strong> — открывают разведчиков, воров, катапульты и особые юниты."
            - "Стройте <strong>Фермы</strong> и <strong>Охотников</strong> для пропитания населения и разведчиков."
            - "Постоянно отправляйте <strong>разведчиков</strong> — земля важнейший ресурс в начале."
            - "Установите рацион на <strong>Высокий</strong> или <strong>Очень высокий</strong> для быстрого роста населения."
            - "Вступите в <strong>альянс</strong> для защиты, пока строите империю."
            - "При стабильном доходе и свободной земле стройте <strong>Башни магов</strong> для исследований."
            - "Стройте <strong>Оружие</strong> и тренируйте <strong>Армию</strong> только после создания твёрдой экономики."
        seasons:
          heading: "Сезоны"
          desc: "Игровой календарь влияет на производство:"
          farms_html: "<strong>Фермы</strong> производят еду только с апреля по октябрь (месяцы 4–10)."
          winter_html: "<strong>Зима</strong> (ноябрь–февраль, месяцы 11–2): люди потребляют дерево для обогрева. Без дерева люди замерзают и умирают."
        protection:
          heading: "Защита"
          desc_html: "Новые игроки начинают с <strong>%{turns} ходами защиты</strong>, в течение которых нельзя атаковать. Используйте это время для экономики."
        scoring:
